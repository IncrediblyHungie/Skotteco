  <title>You're Booked — Skotte</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: #1A1612;
      color: #F2EDE8;
      font-family: 'Source Sans 3', -apple-system, sans-serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 2rem;
      text-align: center;
    }
    .logo {
      font-family: 'Source Sans 3', sans-serif;
      font-weight: 600;
      letter-spacing: 0.25em;
      font-size: 1rem;
      color: #C4A265;
      text-decoration: none;
      margin-bottom: 3rem;
      display: block;
    }
    .check {
      width: 64px;
      height: 64px;
      border-radius: 50%;
      background: rgba(196, 162, 101, 0.15);
      border: 1px solid rgba(196, 162, 101, 0.4);
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto 2rem;
      font-size: 1.75rem;
    }
    h1 {
      font-family: 'Fraunces', serif;
      font-size: clamp(2rem, 5vw, 3.5rem);
      font-weight: 400;
      line-height: 1.2;
      margin-bottom: 1rem;
    }
    h1 em {
      font-style: italic;
      color: #C4A265;
    }
    p {
      color: rgba(242, 237, 232, 0.65);
      font-size: 1.1rem;
      max-width: 480px;
      line-height: 1.7;
      margin: 0 auto 2.5rem;
    }
    .btn {
      display: inline-block;
      background: transparent;
      color: #F2EDE8;
      border: 1px solid rgba(242, 237, 232, 0.25);
      padding: 0.75rem 2rem;
      font-family: 'Source Sans 3', sans-serif;
      font-size: 0.95rem;
      letter-spacing: 0.05em;
      text-decoration: none;
      border-radius: 2px;
      transition: border-color 200ms, color 200ms;
    }
    .btn:hover { border-color: #C4A265; color: #C4A265; }
  </style>
</head>
<body>
  <a href="/" class="logo">SKOTTE</a>
  <div class="check">&#10003;</div>
  <h1>You're on the calendar.<br><em>We'll see you soon.</em></h1>
  <p>Check your email for confirmation details. We're looking forward to learning about your business.</p>
  <a href="/" class="btn">Back to Skotte &rarr;</a>
</body>
